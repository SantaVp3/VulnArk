server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: vulnark-backend

  # 阿里云MySQL数据库配置
  datasource:
    url: jdbc:mysql://${DB_HOST:rm-bp12rmv4rgp0p70k2lo.mysql.rds.aliyuncs.com}:${DB_PORT:3306}/${DB_NAME:vulnark}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:vpsanta3}
    password: ${DB_PASSWORD:JWJxwTVwx7ZhLZgLG9!k}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update  # 修改为update，自动更新数据库结构
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # SQL初始化配置
  sql:
    init:
      mode: always
      schema-locations: classpath:db/vulnark_complete.sql
      continue-on-error: true
      encoding: utf-8

  # Redis缓存配置 - 开发环境
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # RabbitMQ Configuration - 开发环境
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
        acknowledge-mode: auto
        concurrency: 1
        max-concurrency: 3
    template:
      mandatory: false
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3

  # 任务调度配置
  task:
    scheduling:
      pool:
        size: 5
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
        keep-alive: 60s
  
  # 静态资源配置
  web:
    resources:
      add-mappings: false  # 禁用Spring Boot默认的静态资源映射
  mvc:
    static-path-pattern: /static/**  # 限制静态资源路径模式

# JWT 配置 - 必须通过环境变量设置
jwt:
  secret: ${JWT_SECRET:m/+5hp3RaKo89DF9nOZQRwrX6s3lWaAqVeO1aF8Tazh0ZSdHT8tsYVlQK7Zh4QCy}
  expiration: ${JWT_EXPIRATION:86400000}

# 开发环境日志配置
logging:
  level:
    com.vulnark: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

# VulnArk 应用配置
vulnark:
  # 文件存储配置
  storage:
    upload-path: ${VULNARK_UPLOAD_PATH:${user.home}/.vulnark/uploads}
    max-file-size: ${MAX_FILE_SIZE:10MB}
    allowed-extensions: pdf,doc,docx,txt,png,jpg,jpeg,gif,xml,json,csv
  
  # 扫描工具配置
  tools:
    base-path: ${VULNARK_TOOLS_BASE_PATH:${user.home}/.vulnark/tools}
    download-timeout: 300000
    auto-update: ${TOOLS_AUTO_UPDATE:true}
  
  # 扫描结果存储
  scan:
    results-path: ${VULNARK_SCAN_RESULTS_PATH:${user.home}/.vulnark/results}
    keep-raw-results: ${KEEP_RAW_RESULTS:true}
    max-concurrent-scans: ${MAX_CONCURRENT_SCANS:5}
  
  # 安全配置
  security:
    password-min-length: 8
    session-timeout: 1800
    max-login-attempts: 5
    account-lockout-duration: 300
  
  # 系统监控
  monitoring:
    enabled: ${MONITORING_ENABLED:true}
    metrics-interval: 60
  
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# 扫描引擎配置
scan:
  # 通用扫描配置
  general:
    max-parallel-tasks: ${MAX_PARALLEL_SCANS:3}
    default-timeout: ${DEFAULT_SCAN_TIMEOUT:1800}
    result-retention-days: ${RESULT_RETENTION_DAYS:30}

# 开发环境启用Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 静态资源配置 - 移动到正确位置
